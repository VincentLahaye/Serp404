name: Release

on:
  push:
    branches:
      - main
    paths:
      - "src-tauri/tauri.conf.json"
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from tauri.conf.json
        id: version
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          TAG="v$(jq -r '.version' src-tauri/tauri.conf.json)"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping release"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist, will release"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            args: ""
            bundle_glob: "nsis/*.exe"
            stable_name: Serp404_windows_x64.exe
          - runner: macos-latest
            args: "--target x86_64-apple-darwin"
            bundle_glob: "dmg/*.dmg"
            stable_name: Serp404_macos_x64.dmg
          - runner: macos-14
            args: "--target aarch64-apple-darwin"
            bundle_glob: "dmg/*.dmg"
            stable_name: Serp404_macos_arm64.dmg

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.runner == 'macos-latest' && 'x86_64-apple-darwin' || matrix.runner == 'macos-14' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ matrix.args }}

      - name: Rename artifact to stable name
        shell: bash
        run: |
          ARTIFACT=$(find src-tauri/target -path "*/bundle/${{ matrix.bundle_glob }}" | head -1)
          cp "$ARTIFACT" "${{ matrix.stable_name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.stable_name }}
          path: ${{ matrix.stable_name }}

  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create tag
        run: |
          git tag ${{ needs.check-version.outputs.tag }}
          git push origin ${{ needs.check-version.outputs.tag }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          name: "Serp404 ${{ needs.check-version.outputs.tag }}"
          body: |
            ## Download

            | Platform | Installer |
            |---|---|
            | Windows (x64) | [Serp404_windows_x64.exe](https://github.com/${{ github.repository }}/releases/latest/download/Serp404_windows_x64.exe) |
            | macOS (Apple Silicon) | [Serp404_macos_arm64.dmg](https://github.com/${{ github.repository }}/releases/latest/download/Serp404_macos_arm64.dmg) |
            | macOS (Intel) | [Serp404_macos_x64.dmg](https://github.com/${{ github.repository }}/releases/latest/download/Serp404_macos_x64.dmg) |

            > **macOS users:** Right-click the app and select "Open" to bypass Gatekeeper (app is not yet notarized).
          files: |
            Serp404_windows_x64.exe
            Serp404_macos_x64.dmg
            Serp404_macos_arm64.dmg
